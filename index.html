<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Atlas - Atlas Mondial Interactif</title>
    <!-- On relie notre fichier de décoration CSS ici -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- L'en-tête du site (Le logo et le menu) -->
    <header>
        <div class="header-container">
            <div class="logo">🌐 World Atlas</div>
            <nav>
                <ul>
                    <li><a href="#" class="active">Countries</a></li>
                    <li><a href="#">Regions</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Le contenu principal de notre page -->
    <main>
        <!-- Section 1 : La barre de recherche -->
        <section class="search-section">
            <h1>Découvrez le Monde</h1>
            <p>Saisissez le nom d'un pays pour générer sa carte d'identité.</p>

            <form id="search-form" novalidate>
                <div class="input-group">
                    <input
                        type="text"
                        id="country-input"
                        placeholder="Ex: Haiti, Canada, France..."
                        autocomplete="off"
                    >
                    <button type="submit">Rechercher</button>
                </div>
                <!-- Message d'erreur si l'utilisateur se trompe -->
                <p id="error-message" class="error-text hidden" role="alert"></p>
            </form>
        </section>

        <!-- Section 2 : La zone qui affiche les résultats -->
        <section class="result-section">
            <!-- Un petit message d'attente pendant que le site cherche sur internet -->
            <div id="loader" class="loader hidden">
                <div class="spinner"></div>
                <p>Chargement des données...</p>
            </div>

            <!-- La carte d'identité du pays -->
            <div id="country-card" class="country-card hidden">
                <div class="card-header">
                    <img id="country-flag" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'/%3E" alt="Drapeau du pays">
                    <h2 id="country-name">Nom du pays</h2>
                </div>
                <div class="card-body">
                    <div class="info-item">
                        <span class="icon">🏛️</span>
                        <span class="label">Capitale:</span>
                        <span id="country-capital" class="value"></span>
                    </div>
                    <div class="info-item">
                        <span class="icon">👥</span>
                        <span class="label">Population:</span>
                        <span id="country-population" class="value"></span>
                    </div>
                    <div class="info-item">
                        <span class="icon">🌍</span>
                        <span class="label">Région:</span>
                        <span id="country-region" class="value"></span>
                    </div>
                    <div class="info-item">
                        <span class="icon">💵</span>
                        <span class="label">Monnaie:</span>
                        <span id="country-currency" class="value"></span>
                    </div>
                    <div class="info-item">
                        <span class="icon">💬</span>
                        <span class="label">Langues:</span>
                        <span id="country-languages" class="value"></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Le bas de la page -->
    <footer>
        <p>&copy; 2026 World Atlas. Tous droits réservés.</p>
    </footer>

    <!-- Script JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
